<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="format-detection" content="telephone=no" />
    <title>ESGCheck Email Signature</title>
    <style type="text/css">
      @media only screen and (max-width: 600px) {
        .sig-shell {
          width: 100% !important;
          max-width: 100% !important;
        }

        .sig-pad {
          padding: 12px 0 !important;
        }

        .sig-content {
          padding: 0 12px !important;
        }

        .sig-intro-cell {
          width: 56px !important;
          padding-right: 12px !important;
        }

        .sig-intro-logo {
          width: 48px !important;
          height: 48px !important;
        }

        .sig-greeting {
          font-size: 17px !important;
          line-height: 24px !important;
        }

        .sig-team {
          font-size: 19px !important;
          line-height: 25px !important;
        }

        .sig-contact-item {
          display: block !important;
          width: 100% !important;
          padding: 0 0 12px 0 !important;
          border-right: 0 !important;
        }

        .sig-contact-item-last {
          padding-bottom: 0 !important;
        }

        .sig-contact-spacer {
          display: none !important;
        }

        .sig-brand-cell,
        .sig-tagline-cell {
          display: block !important;
          width: 100% !important;
        }

        .sig-tagline-cell {
          padding: 10px 0 0 0 !important;
          border-left: 0 !important;
        }

        .sig-brand-text {
          font-size: 23px !important;
          line-height: 29px !important;
        }

        .sig-tagline {
          font-size: 14px !important;
          line-height: 20px !important;
        }
      }
    </style>
  </head>
  <body style="margin:0; padding:0; background-color:#ffffff;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="width:100%; border-collapse:collapse; background-color:#ffffff;">
      <tr>
        <td class="sig-pad" align="left" style="padding:18px 0;">
          <table class="sig-shell" role="presentation" width="640" cellspacing="0" cellpadding="0" border="0" style="width:640px; max-width:640px; border-collapse:collapse;">
            <tr>
              <td class="sig-content" style="padding:0 18px;">
                <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="width:100%; border-collapse:collapse;">
                  <tr>
                    <td height="1" bgcolor="#d6e3d9" style="height:1px; line-height:1px; font-size:1px; background-color:#d6e3d9;">&nbsp;</td>
                  </tr>
                </table>

                <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="width:100%; border-collapse:collapse;">
                  <tr>
                    <td style="padding:22px 0 20px 0;">
                      <table role="presentation" cellspacing="0" cellpadding="0" border="0" style="border-collapse:collapse;">
                        <tr>
                          <td class="sig-intro-cell" valign="middle" width="78" style="width:78px; padding:0 18px 0 0;">
                            <img class="sig-intro-logo" src="https://esgcheck.ch/email-signature-icon-footer.png" width="60" height="60" alt="" style="display:block; width:60px; height:60px; border:0;" />
                          </td>
                          <td valign="middle" style="font-family:Arial, Helvetica, sans-serif; color:#243028;">
                            <p class="sig-greeting" style="margin:0 0 4px 0; font-family:Arial, Helvetica, sans-serif; font-size:18px; line-height:25px; font-weight:400; color:#243028;">
                              Kind regards,
                            </p>
                            <p class="sig-team" style="margin:0; font-family:Arial, Helvetica, sans-serif; font-size:20px; line-height:27px; font-weight:700; color:#17212b;">
                              The ESGCheck Team
                            </p>
                          </td>
                        </tr>
                      </table>
                    </td>
                  </tr>
                </table>

                <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="width:100%; border-collapse:collapse;">
                  <tr>
                    <td class="sig-contact-item" width="31%" valign="middle" style="width:31%; padding:0 14px 0 0; font-family:Arial, Helvetica, sans-serif; border-right:1px solid #d6e3d9;">
                      <table role="presentation" cellspacing="0" cellpadding="0" border="0" style="border-collapse:collapse;">
                        <tr>
                          <td valign="middle" width="26" style="width:26px; padding:0 9px 0 0;">
                            <img src="https://esgcheck.ch/email-signature-icon-email.png" width="20" height="20" alt="Email" style="display:block; width:20px; height:20px; border:0;" />
                          </td>
                          <td valign="middle" style="font-family:Arial, Helvetica, sans-serif; font-size:14px; line-height:20px; font-weight:400; color:#243028;">
                            <a href="mailto:info@esgcheck.ch" target="_blank" style="color:#243028; text-decoration:none;">info@esgcheck.ch</a>
                          </td>
                        </tr>
                      </table>
                    </td>
                    <td class="sig-contact-spacer" width="16" style="width:16px; font-size:1px; line-height:1px;">&nbsp;</td>
                    <td class="sig-contact-item" width="24%" valign="middle" style="width:24%; padding:0 14px 0 0; font-family:Arial, Helvetica, sans-serif; border-right:1px solid #d6e3d9;">
                      <table role="presentation" cellspacing="0" cellpadding="0" border="0" style="border-collapse:collapse;">
                        <tr>
                          <td valign="middle" width="26" style="width:26px; padding:0 9px 0 0;">
                            <img src="https://esgcheck.ch/email-signature-icon-world.png" width="20" height="20" alt="Website" style="display:block; width:20px; height:20px; border:0;" />
                          </td>
                          <td valign="middle" style="font-family:Arial, Helvetica, sans-serif; font-size:14px; line-height:20px; font-weight:400; color:#243028;">
                            <a href="https://esgcheck.ch/" target="_blank" style="color:#243028; text-decoration:none;">esgcheck.ch</a>
                          </td>
                        </tr>
                      </table>
                    </td>
                    <td class="sig-contact-spacer" width="16" style="width:16px; font-size:1px; line-height:1px;">&nbsp;</td>
                    <td class="sig-contact-item sig-contact-item-last" width="37%" valign="middle" style="width:37%; padding:0; font-family:Arial, Helvetica, sans-serif;">
                      <table role="presentation" cellspacing="0" cellpadding="0" border="0" style="border-collapse:collapse;">
                        <tr>
                          <td valign="middle" width="26" style="width:26px; padding:0 9px 0 0;">
                            <table role="presentation" width="20" height="20" cellspacing="0" cellpadding="0" border="0" style="width:20px; height:20px; border-collapse:separate;">
                              <tr>
                                <td align="center" valign="middle" style="border:2px solid #2b593e; border-radius:4px; font-family:Arial, Helvetica, sans-serif; font-size:12px; line-height:12px; font-weight:700; color:#2b593e;">
                                  in
                                </td>
                              </tr>
                            </table>
                          </td>
                          <td valign="middle" style="font-family:Arial, Helvetica, sans-serif; font-size:14px; line-height:20px; font-weight:400; color:#243028;">
                            <a href="https://www.linkedin.com/company/esgcheck" target="_blank" style="color:#243028; text-decoration:none;">linkedin.com/company/esgcheck</a>
                          </td>
                        </tr>
                      </table>
                    </td>
                  </tr>
                </table>

                <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="width:100%; border-collapse:collapse;">
                  <tr>
                    <td style="padding:20px 0 0 0;">
                      <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="width:100%; border-collapse:collapse;">
                        <tr>
                          <td height="1" bgcolor="#d6e3d9" style="height:1px; line-height:1px; font-size:1px; background-color:#d6e3d9;">&nbsp;</td>
                        </tr>
                      </table>
                    </td>
                  </tr>
                </table>

                <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="width:100%; border-collapse:collapse;">
                  <tr>
                    <td style="padding:18px 0 0 0;">
                      <table role="presentation" cellspacing="0" cellpadding="0" border="0" style="border-collapse:collapse;">
                        <tr>
                          <td class="sig-brand-cell" valign="middle" style="padding:0 24px 0 0;">
                            <table role="presentation" cellspacing="0" cellpadding="0" border="0" style="border-collapse:collapse;">
                              <tr>
                                <td valign="middle" style="padding:0 10px 0 0;">
                                  <img src="https://esgcheck.ch/email-logo-mark.png" width="34" height="34" alt="ESGCheck Logo" style="display:block; width:34px; height:34px; border:0;" />
                                </td>
                                <td class="sig-brand-text" valign="middle" style="font-family:Arial, Helvetica, sans-serif; font-size:24px; line-height:30px; font-weight:400; color:#17212b;">
                                  <span style="font-weight:700; color:#10843b;">ESG</span>Check
                                </td>
                              </tr>
                            </table>
                          </td>
                          <td class="sig-tagline-cell" valign="middle" style="padding:0 0 0 24px; border-left:1px solid #d6e3d9;">
                            <p class="sig-tagline" style="margin:0; font-family:Arial, Helvetica, sans-serif; font-size:15px; line-height:22px; font-weight:400; color:#243028;">
                              Practical ESG first assessment for growing B2B SMEs
                            </p>
                          </td>
                        </tr>
                      </table>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
