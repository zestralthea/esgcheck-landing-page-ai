<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="format-detection" content="telephone=no" />
    <title>ESGCheck E-Mail-Signatur</title>
    <style type="text/css">
      @media only screen and (max-width: 600px) {
        .sig-shell {
          width: 100% !important;
          max-width: 100% !important;
        }

        .sig-pad {
          padding: 18px 0 !important;
        }

        .sig-content {
          padding: 0 16px !important;
        }

        .sig-intro-cell {
          width: 78px !important;
          padding-right: 16px !important;
        }

        .sig-intro-logo {
          width: 62px !important;
          height: 62px !important;
        }

        .sig-greeting {
          font-size: 23px !important;
          line-height: 31px !important;
        }

        .sig-team {
          font-size: 25px !important;
          line-height: 32px !important;
        }

        .sig-contact-item {
          display: block !important;
          width: 100% !important;
          padding: 0 0 12px 0 !important;
          border-right: 0 !important;
        }

        .sig-contact-item-last {
          padding-bottom: 0 !important;
        }

        .sig-contact-spacer {
          display: none !important;
        }

        .sig-brand-cell,
        .sig-tagline-cell {
          display: block !important;
          width: 100% !important;
        }

        .sig-tagline-cell {
          padding: 16px 0 0 0 !important;
          border-left: 0 !important;
        }

        .sig-brand-text {
          font-size: 28px !important;
          line-height: 34px !important;
        }

        .sig-tagline {
          font-size: 18px !important;
          line-height: 26px !important;
        }
      }
    </style>
  </head>
  <body style="margin:0; padding:0; background-color:#ffffff;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="width:100%; border-collapse:collapse; background-color:#ffffff;">
      <tr>
        <td class="sig-pad" align="left" style="padding:28px 0;">
          <table class="sig-shell" role="presentation" width="760" cellspacing="0" cellpadding="0" border="0" style="width:760px; max-width:760px; border-collapse:collapse;">
            <tr>
              <td class="sig-content" style="padding:0 24px;">
                <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="width:100%; border-collapse:collapse;">
                  <tr>
                    <td height="1" bgcolor="#d6e3d9" style="height:1px; line-height:1px; font-size:1px; background-color:#d6e3d9;">&nbsp;</td>
                  </tr>
                </table>

                <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="width:100%; border-collapse:collapse;">
                  <tr>
                    <td style="padding:32px 0 30px 0;">
                      <table role="presentation" cellspacing="0" cellpadding="0" border="0" style="border-collapse:collapse;">
                        <tr>
                          <td class="sig-intro-cell" valign="middle" width="112" style="width:112px; padding:0 28px 0 0;">
                            <img class="sig-intro-logo" src="https://esgcheck.ch/email-signature-icon-footer.png" width="96" height="96" alt="" style="display:block; width:96px; height:96px; border:0;" />
                          </td>
                          <td valign="middle" style="font-family:Arial, Helvetica, sans-serif; color:#243028;">
                            <p class="sig-greeting" style="margin:0 0 8px 0; font-family:Arial, Helvetica, sans-serif; font-size:26px; line-height:34px; font-weight:400; color:#243028;">
                              Freundliche Grüsse,
                            </p>
                            <p class="sig-team" style="margin:0; font-family:Arial, Helvetica, sans-serif; font-size:28px; line-height:36px; font-weight:700; color:#17212b;">
                              Das ESGCheck Team
                            </p>
                          </td>
                        </tr>
                      </table>
                    </td>
                  </tr>
                </table>

                <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="width:100%; border-collapse:collapse;">
                  <tr>
                    <td class="sig-contact-item" width="31%" valign="middle" style="width:31%; padding:0 20px 0 0; font-family:Arial, Helvetica, sans-serif; border-right:1px solid #d6e3d9;">
                      <table role="presentation" cellspacing="0" cellpadding="0" border="0" style="border-collapse:collapse;">
                        <tr>
                          <td valign="middle" width="30" style="width:30px; padding:0 12px 0 0;">
                            <img src="https://esgcheck.ch/email-signature-icon-email.png" width="26" height="26" alt="E-Mail" style="display:block; width:26px; height:26px; border:0;" />
                          </td>
                          <td valign="middle" style="font-family:Arial, Helvetica, sans-serif; font-size:17px; line-height:24px; font-weight:400; color:#243028;">
                            <a href="mailto:info@esgcheck.ch" target="_blank" style="color:#243028; text-decoration:none;">info@esgcheck.ch</a>
                          </td>
                        </tr>
                      </table>
                    </td>
                    <td class="sig-contact-spacer" width="22" style="width:22px; font-size:1px; line-height:1px;">&nbsp;</td>
                    <td class="sig-contact-item" width="26%" valign="middle" style="width:26%; padding:0 20px 0 0; font-family:Arial, Helvetica, sans-serif; border-right:1px solid #d6e3d9;">
                      <table role="presentation" cellspacing="0" cellpadding="0" border="0" style="border-collapse:collapse;">
                        <tr>
                          <td valign="middle" width="30" style="width:30px; padding:0 12px 0 0;">
                            <img src="https://esgcheck.ch/email-signature-icon-world.png" width="26" height="26" alt="Website" style="display:block; width:26px; height:26px; border:0;" />
                          </td>
                          <td valign="middle" style="font-family:Arial, Helvetica, sans-serif; font-size:17px; line-height:24px; font-weight:400; color:#243028;">
                            <a href="https://esgcheck.ch/" target="_blank" style="color:#243028; text-decoration:none;">esgcheck.ch</a>
                          </td>
                        </tr>
                      </table>
                    </td>
                    <td class="sig-contact-spacer" width="22" style="width:22px; font-size:1px; line-height:1px;">&nbsp;</td>
                    <td class="sig-contact-item sig-contact-item-last" width="35%" valign="middle" style="width:35%; padding:0; font-family:Arial, Helvetica, sans-serif;">
                      <table role="presentation" cellspacing="0" cellpadding="0" border="0" style="border-collapse:collapse;">
                        <tr>
                          <td valign="middle" width="30" style="width:30px; padding:0 12px 0 0;">
                            <table role="presentation" width="26" height="26" cellspacing="0" cellpadding="0" border="0" style="width:26px; height:26px; border-collapse:separate;">
                              <tr>
                                <td align="center" valign="middle" style="border:2px solid #2b593e; border-radius:4px; font-family:Arial, Helvetica, sans-serif; font-size:16px; line-height:16px; font-weight:700; color:#2b593e;">
                                  in
                                </td>
                              </tr>
                            </table>
                          </td>
                          <td valign="middle" style="font-family:Arial, Helvetica, sans-serif; font-size:17px; line-height:24px; font-weight:400; color:#243028;">
                            <a href="https://www.linkedin.com/company/esgcheck" target="_blank" style="color:#243028; text-decoration:none;">linkedin.com/company/esgcheck</a>
                          </td>
                        </tr>
                      </table>
                    </td>
                  </tr>
                </table>

                <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="width:100%; border-collapse:collapse;">
                  <tr>
                    <td style="padding:30px 0 0 0;">
                      <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="width:100%; border-collapse:collapse;">
                        <tr>
                          <td height="1" bgcolor="#d6e3d9" style="height:1px; line-height:1px; font-size:1px; background-color:#d6e3d9;">&nbsp;</td>
                        </tr>
                      </table>
                    </td>
                  </tr>
                </table>

                <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="width:100%; border-collapse:collapse;">
                  <tr>
                    <td style="padding:28px 0 0 0;">
                      <table role="presentation" cellspacing="0" cellpadding="0" border="0" style="border-collapse:collapse;">
                        <tr>
                          <td class="sig-brand-cell" valign="middle" style="padding:0 34px 0 0;">
                            <table role="presentation" cellspacing="0" cellpadding="0" border="0" style="border-collapse:collapse;">
                              <tr>
                                <td valign="middle" style="padding:0 12px 0 0;">
                                  <img src="https://esgcheck.ch/email-logo-mark.png" width="48" height="48" alt="ESGCheck Logo" style="display:block; width:48px; height:48px; border:0;" />
                                </td>
                                <td class="sig-brand-text" valign="middle" style="font-family:Arial, Helvetica, sans-serif; font-size:32px; line-height:38px; font-weight:400; color:#17212b;">
                                  <span style="font-weight:700; color:#10843b;">ESG</span>Check
                                </td>
                              </tr>
                            </table>
                          </td>
                          <td class="sig-tagline-cell" valign="middle" style="padding:0 0 0 34px; border-left:1px solid #d6e3d9;">
                            <p class="sig-tagline" style="margin:0; font-family:Arial, Helvetica, sans-serif; font-size:20px; line-height:28px; font-weight:400; color:#243028;">
                              Praxisnahe ESG-Ersteinschätzung für wachsende KMU
                            </p>
                          </td>
                        </tr>
                      </table>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
