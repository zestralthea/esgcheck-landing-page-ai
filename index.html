    <link rel="stylesheet" href="https://sibforms.com/forms/end-form/build/sib-styles.css" />
  </head>

  <body>
    <div id="root"></div>
    <script>
      window.REQUIRED_CODE_ERROR_MESSAGE = "Please choose a country code";
      window.LOCALE = "en";
      window.EMAIL_INVALID_MESSAGE = window.SMS_INVALID_MESSAGE =
        "The information provided is invalid. Please review the field format and try again.";
      window.REQUIRED_ERROR_MESSAGE = "This field cannot be left blank. ";
      window.GENERIC_INVALID_MESSAGE =
        "The information provided is invalid. Please review the field format and try again.";
      window.translation = {
        common: {
          selectedList: "{quantity} list selected",
          selectedLists: "{quantity} lists selected",
          selectedOption: "{quantity} selected",
          selectedOptions: "{quantity} selected",
        },
      };
      window.AUTOHIDE = false;
      window.handleCaptchaResponse = function handleCaptchaResponse() {
        var captcha = document.getElementById("sib-captcha");
        if (captcha) {
          captcha.dispatchEvent(new Event("captchaChange"));
        }
        window.grecaptcha = window.turnstile;
      };
      window.onBrevoTurnstileLoad = function onBrevoTurnstileLoad() {
        window.grecaptcha = window.turnstile;
        if (window.renderBrevoTurnstile) {
          window.renderBrevoTurnstile();
        }
      };
    </script>
    <script
      defer
      src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit&onload=onBrevoTurnstileLoad"
    ></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
